<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="920" viewBox="0 0 1180 920">
  <defs>
    <style>
      .box { fill:#ffffff; stroke:#000000; stroke-width:2; rx:8; }
      .decision { fill:#ffffff; stroke:#000000; stroke-width:2; }
      .txt { font-family: Arial, sans-serif; font-size:18px; fill:#000000; text-anchor:middle; dominant-baseline:middle; }
      .small { font-family: Arial, sans-serif; font-size:15px; fill:#000000; text-anchor:middle; dominant-baseline:middle; }
      .edge { stroke:#000000; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .label { font-family: Arial, sans-serif; font-size:15px; fill:#000000; font-weight:bold; }
      .title { font-family: Arial, sans-serif; font-size:26px; font-weight:bold; fill:#000000; text-anchor:middle; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000000" />
    </marker>
  </defs>

  <text x="590" y="35" class="title">ROI Tracking Pipeline 2K</text>

  <rect x="420" y="70" width="340" height="62" class="box"/>
  <text x="590" y="101" class="txt">Frame gốc 2560×1440</text>

  <polygon points="590,170 775,245 590,320 405,245" class="decision"/>
  <text x="590" y="232" class="txt">Đã có bbox</text>
  <text x="590" y="258" class="txt">frame trước?</text>

  <rect x="80" y="215" width="270" height="62" class="box"/>
  <text x="215" y="246" class="txt">Full model 640×640</text>

  <rect x="80" y="330" width="270" height="62" class="box"/>
  <text x="215" y="350" class="txt">Bbox ảnh gốc</text>
  <text x="215" y="374" class="small">2560×1440</text>

  <rect x="420" y="365" width="340" height="62" class="box"/>
  <text x="590" y="386" class="txt">Tính ROI vuông NxN</text>
  <text x="590" y="410" class="small">từ bbox frame trước</text>

  <rect x="420" y="475" width="340" height="62" class="box"/>
  <text x="590" y="496" class="txt">Crop ROI từ frame gốc</text>
  <text x="590" y="520" class="small">2560×1440 → ROI NxN</text>

  <rect x="420" y="585" width="340" height="62" class="box"/>
  <text x="590" y="606" class="txt">Resize ROI</text>
  <text x="590" y="630" class="small">NxN → 160×160</text>

  <rect x="420" y="695" width="340" height="62" class="box"/>
  <text x="590" y="716" class="txt">Tracking model</text>
  <text x="590" y="740" class="small">static 160×160</text>

  <polygon points="590,795 740,850 590,905 440,850" class="decision"/>
  <text x="590" y="840" class="txt">Detect được</text>
  <text x="590" y="864" class="txt">Leanbot?</text>

  <rect x="825" y="805" width="280" height="62" class="box"/>
  <text x="965" y="825" class="txt">Bbox hệ 160×160</text>
  <text x="965" y="849" class="small">scale về ROI NxN</text>

  <rect x="825" y="690" width="280" height="62" class="box"/>
  <text x="965" y="710" class="txt">Cộng offset ROI</text>
  <text x="965" y="734" class="small">về ảnh gốc 2560×1440</text>

  <rect x="825" y="575" width="280" height="62" class="box"/>
  <text x="965" y="595" class="txt">Cập nhật bbox</text>
  <text x="965" y="619" class="small">và ROI frame sau</text>

  <rect x="80" y="805" width="270" height="62" class="box"/>
  <text x="215" y="825" class="txt">tracking_lost = 1</text>
  <text x="215" y="849" class="small">lưu frame + ROI debug</text>

  <path d="M590 132 L590 170" class="edge"/>

  <path d="M405 245 L350 245" class="edge"/>
  <text x="360" y="225" class="label">Không / lost</text>
  <path d="M215 277 L215 330" class="edge"/>
  <path d="M350 361 L405 361 L405 396 L420 396" class="edge"/>

  <path d="M590 320 L590 365" class="edge"/>
  <text x="620" y="345" class="label">Có</text>
  <path d="M590 427 L590 475" class="edge"/>
  <path d="M590 537 L590 585" class="edge"/>
  <path d="M590 647 L590 695" class="edge"/>
  <path d="M590 757 L590 795" class="edge"/>

  <path d="M740 850 L825 850" class="edge"/>
  <text x="770" y="832" class="label">Có</text>
  <path d="M965 805 L965 752" class="edge"/>
  <path d="M965 690 L965 637" class="edge"/>
  <path d="M825 606 L790 606 L790 396 L760 396" class="edge"/>

  <path d="M440 850 L350 850" class="edge"/>
  <text x="392" y="832" class="label">Không</text>
  <path d="M215 805 L35 805 L35 246 L80 246" class="edge"/>
</svg>
